name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend-v2

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  browser-smoke:
    name: Browser smoke tests
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm ci --prefix frontend-v2
          npm --prefix frontend-v2 exec playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build --prefix frontend-v2

      - name: Run clean-data browser smoke tests
        working-directory: frontend-v2
        env:
          TRPG_DATA_DIR: ${{ runner.temp }}/diceframe-e2e-data
          DICEFRAME_E2E_DATA_DIR: ${{ runner.temp }}/diceframe-e2e-data
        run: |
          python ../web_server.py > "${RUNNER_TEMP}/diceframe-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --silent --output /dev/null http://127.0.0.1:18000/api/health; then
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              cat "${RUNNER_TEMP}/diceframe-server.log"
              exit 1
            fi
            sleep 1
          done
          npm run test:e2e -- e2e/shell.spec.ts e2e/responsive.spec.ts --project=desktop
